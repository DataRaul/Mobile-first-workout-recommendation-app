<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10131a">
  <meta name="description" content="A personal non-commercial workout programme recommender and tracker.">
  <title>Workout Recommender</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <button id="brandButton" class="brand" type="button" aria-label="Open Today">
      <span class="brand-mark">WR</span>
      <span><strong>Workout Recommender</strong><small id="headerSubtitle">Personal programme</small></span>
    </button>
    <span id="datasetBadge" class="status-pill">Loading exercises…</span>
  </header>

  <main id="app" class="app-shell" aria-live="polite">
    <section id="loadingView" class="view active center-view">
      <div class="loader"></div>
      <h1>Loading the exercise library</h1>
      <p>The complete 1,324-exercise dataset is being prepared.</p>
    </section>

    <section id="onboardingView" class="view"></section>
    <section id="plannerView" class="view"></section>
    <section id="todayView" class="view"></section>
    <section id="sessionView" class="view"></section>
    <section id="routineView" class="view"></section>
    <section id="progressView" class="view"></section>
    <section id="exercisesView" class="view"></section>
    <section id="profileView" class="view"></section>
  </main>

  <nav id="bottomNav" class="bottom-nav" aria-label="Main navigation" hidden>
    <button data-view="todayView" class="active"><span>Today</span></button>
    <button data-view="routineView"><span>Routine</span></button>
    <button data-view="progressView"><span>Progress</span></button>
    <button data-view="exercisesView"><span>Exercises</span></button>
    <button data-view="profileView"><span>Profile</span></button>
  </nav>

  <dialog id="exerciseDialog" class="exercise-dialog">
    <button id="closeExerciseDialog" class="dialog-close" aria-label="Close">×</button>
    <div id="exerciseDialogContent"></div>
  </dialog>

  <div id="toast" class="toast" role="status" hidden></div>

  <footer class="attribution">
    Personal, non-commercial use. Exercise data and media via
    <a href="https://github.com/hasaneyldrm/exercises-dataset" target="_blank" rel="noreferrer">exercises-dataset</a>.
    Media attribution: © Gym visual.
  </footer>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
